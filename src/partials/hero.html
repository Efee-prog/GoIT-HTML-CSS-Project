<section class="hero section" id="hero">
  <div class="container">
    <div class="hero-content">
      <h1>
        Discover the magic of <span class="highlight">photography</span> in our
        school
      </h1>
      <p>
        Our photography school offers an unforgettable journey, where you can
        learn the basics of composition, master technical skills, translate your
        unique ideas.
      </p>

      <div class="students-block">
        <div class="students-left">
          <div class="avatars">
            <img
              src="./img/girl-1.png"
              alt="Portrait of a female student"
              width="44"
              height="44"
              loading="lazy"
            />
            <img
              src="./img/boy.png"
              alt="Portrait of a male student"
              width="44"
              height="44"
              loading="lazy"
            />
            <img
              src="./img/girl.png"
              alt="Portrait of another female student"
              width="44"
              height="44"
              loading="lazy"
            />
          </div>
          <a href="#reviews" class="students-link"
            >Our happy students <span class="arrow" aria-hidden="true">→</span></a
          >
        </div>

        <div class="reviews">
          <div class="star">
            <img
              src="./img/star.svg"
              alt=""
              aria-hidden="true"
              width="20"
              height="20"
            />
          </div>
          <div class="review-text">
            <p>Reviews</p>
            <p class="count">+1500</p>
          </div>
        </div>
      </div>
    </div>

    <div class="hero-image-container">
      <!-- ACTION REQUIRED: Replace ./img/Rectangle.png with the new exported WebP assets from Figma -->
      <picture>
        <source
          media="(min-width: 1280px)"
          srcset="./img/Rectangle.png 1x"
        />
        <source
          media="(min-width: 768px)"
          srcset="./img/Rectangle.png 1x"
        />
        <img
          src="./img/Rectangle.png"
          alt="Photographer holding a camera"
          width="259"
          height="314"
          loading="lazy"
        />
      </picture>
    </div>
  </div>
</section>
